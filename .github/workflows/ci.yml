# GitHub Actions Workflow Configuration

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Server tests
  server-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Install dependencies
        run: |
          cd signalnest-server
          pnpm install
      
      - name: Run linter
        run: |
          cd signalnest-server
          pnpm run lint || true
      
      - name: Run tests
        run: |
          cd signalnest-server
          pnpm run test || true

  # Android build
  android-build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Build Android app
        run: |
          cd signalnest-app
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: signalnest-app/app/build/outputs/apk/debug/app-debug.apk

  # Code quality
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check file structure
        run: |
          echo "Checking project structure..."
          ls -la
          ls -la signalnest-app
          ls -la signalnest-server
