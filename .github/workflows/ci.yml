name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/FUNDING.yml"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Server lint + test ──────────────────────────────────────────────────────
  server:
    name: Server — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: signalnest-server

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: signalnest-server/package.json

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: |
            - cwd: signalnest-server

      - run: pnpm run lint || true
      - run: pnpm run test || true

  # ── Android debug build (fast, on every PR) ─────────────────────────────────
  android-debug:
    name: Android — debug build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: false

      - name: Build debug APK
        run: |
          cd signalnest-app
          chmod +x gradlew
          ./gradlew assembleDebug \
            --no-daemon \
            --parallel \
            --build-cache \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: signalnest-app/app/build/outputs/apk/debug/*.apk
          retention-days: 7
