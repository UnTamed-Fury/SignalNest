name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    name: Build & publish release
    runs-on: ubuntu-latest

    env:
      KEYSTORE_FILE: ${{ github.workspace }}/signalnest-release.jks

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # ── Java ─────────────────────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      # ── Gradle cache ─────────────────────────────────────────────────────────
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: false

      # ── Decode keystore ───────────────────────────────────────────────────────
      # Requires repo secret KEYSTORE_BASE64 (base64 of your .jks file).
      # Without it the release APKs will be unsigned (still installable via sideload).
      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_FILE"
          echo "Keystore decoded successfully"

      # ── Set version from tag ──────────────────────────────────────────────────
      - name: Set version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Numeric versionCode: 1.2.3 → 10203
          CODE=$(echo "$VERSION" | awk -F'[.-]' '{printf "%d%02d%02d", $1, $2, $3}')
          echo "code=$CODE"       >> "$GITHUB_OUTPUT"

      # ── Patch versionName + versionCode ──────────────────────────────────────
      - name: Patch version in build.gradle.kts
        run: |
          sed -i "s/versionCode\s*=\s*[0-9]*/versionCode   = ${{ steps.version.outputs.code }}/" \
            signalnest-app/app/build.gradle.kts
          sed -i 's/versionName\s*=\s*"[^"]*"/versionName   = "${{ steps.version.outputs.version }}"/' \
            signalnest-app/app/build.gradle.kts
          echo "Version patched:"
          grep -E "versionCode|versionName" signalnest-app/app/build.gradle.kts

      # ── Build all 5 APKs ─────────────────────────────────────────────────────
      - name: Build release APKs
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          cd signalnest-app
          chmod +x gradlew
          ./gradlew assembleRelease \
            --daemon \
            --parallel \
            --build-cache \
            --configuration-cache \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+UseParallelGC" \
            -Dorg.gradle.workers.max=4 \
            -Dkotlin.incremental=true \
            -Dorg.gradle.parallel=true

      # ── Collect + rename APKs ─────────────────────────────────────────────────
      - name: Collect APKs
        run: |
          APK_DIR="signalnest-app/app/build/outputs/apk/release"
          DEST="release-apks"
          V="${{ steps.version.outputs.version }}"
          mkdir -p "$DEST"

          echo "APKs found in $APK_DIR:"
          find "$APK_DIR" -name "*.apk" | sort

          # Copy each ABI split + universal
          for ABI in arm64-v8a armeabi-v7a x86_64 x86 universal; do
            SRC=$(find "$APK_DIR" -name "*${ABI}*.apk" | head -1)
            if [ -n "$SRC" ]; then
              DEST_NAME="signalnest-v${V}-${ABI}.apk"
              cp "$SRC" "$DEST/$DEST_NAME"
              echo "✓ $DEST_NAME"
            else
              echo "✗ No APK found for $ABI"
            fi
          done

          echo ""
          echo "Collected APKs:"
          ls -lh "$DEST"

      # ── SHA-256 checksums ─────────────────────────────────────────────────────
      - name: Generate checksums
        id: sha
        run: |
          cd release-apks
          sha256sum *.apk > SHA256SUMS.txt
          cat SHA256SUMS.txt
          {
            echo "table<<EOF"
            echo "| File | SHA-256 |"
            echo "|------|---------|"
            while read -r hash file; do
              echo "| \`$file\` | \`$hash\` |"
            done < SHA256SUMS.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── Changelog from commits since last tag ─────────────────────────────────
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..HEAD" \
              --pretty=format:"- %s (%h)" --no-merges | head -50)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges | head -50)
          fi
          [ -z "$LOG" ] && LOG="- Initial release"
          {
            echo "log<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── Create draft release ──────────────────────────────────────────────────
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.version.outputs.tag }}
          name:       "SignalNest ${{ steps.version.outputs.version }}"
          draft:      true
          prerelease: false
          body: |
            ## SignalNest ${{ steps.version.outputs.version }}

            ### What's new
            ${{ steps.changelog.outputs.log }}

            ---

            ### Downloads

            | APK | Architecture | Who needs it |
            |-----|-------------|--------------|
            | `signalnest-v${{ steps.version.outputs.version }}-arm64-v8a.apk`   | ARM64       | All modern Android phones ✓ |
            | `signalnest-v${{ steps.version.outputs.version }}-armeabi-v7a.apk` | ARMv7       | Older phones |
            | `signalnest-v${{ steps.version.outputs.version }}-x86_64.apk`      | x86_64      | Intel phones / emulators |
            | `signalnest-v${{ steps.version.outputs.version }}-x86.apk`         | x86         | Old Intel phones / emulators |
            | `signalnest-v${{ steps.version.outputs.version }}-universal.apk`   | Universal   | All architectures (largest file) |

            > **Not sure?** Download `arm64-v8a` — it works on all modern phones.

            ---

            ### SHA-256 checksums
            ${{ steps.sha.outputs.table }}

            <details>
            <summary>Verify a file</summary>

            ```bash
            sha256sum -c SHA256SUMS.txt
            ```

            </details>

          files: |
            release-apks/*.apk
            release-apks/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
